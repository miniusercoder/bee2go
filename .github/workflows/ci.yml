name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make

      - name: Prepare project
        run: make setup

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: make test
