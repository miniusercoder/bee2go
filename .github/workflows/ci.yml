name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install cmake
        run: sudo apt-get install -y cmake

      - name: Build bee2 static library
        run: bash scripts/build_bee2.sh

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -v -count=1
